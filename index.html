<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grid Wave</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; cursor: crosshair; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const CELL = 8;
let COLS, ROWS;
let grid = [];
let waves = [];

// --- Audio ---
let audioCtx = null;
let masterGain = null;
let reverbNode = null;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.7;
  masterGain.connect(audioCtx.destination);
  reverbNode = createReverb(audioCtx, 6.0);
  reverbNode.connect(masterGain);
}

function createReverb(ctx, duration) {
  const convolver = ctx.createConvolver();
  const rate = ctx.sampleRate;
  const length = rate * duration;
  const impulse = ctx.createBuffer(2, length, rate);
  for (let ch = 0; ch < 2; ch++) {
    const data = impulse.getChannelData(ch);
    for (let i = 0; i < length; i++) {
      const decay = Math.pow(1 - i / length, 2.2);
      data[i] = (Math.random() * 2 - 1) * decay;
    }
  }
  convolver.buffer = impulse;
  return convolver;
}

// 808カウベル
function playCowbell() {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  const decayTime = 0.8 + Math.random() * 0.4;
  const freqs = [562, 845];

  const dryGain = audioCtx.createGain();
  dryGain.connect(masterGain);
  const wetGain = audioCtx.createGain();
  wetGain.gain.value = 0.6;
  wetGain.connect(reverbNode);

  freqs.forEach(freq => {
    const osc = audioCtx.createOscillator();
    osc.type = 'square';
    osc.frequency.value = freq;
    osc.frequency.setTargetAtTime(freq * 0.92, now, decayTime * 0.3);

    const env = audioCtx.createGain();
    env.gain.setValueAtTime(0, now);
    env.gain.linearRampToValueAtTime(0.3, now + 0.005);
    env.gain.exponentialRampToValueAtTime(0.001, now + decayTime);

    const hp = audioCtx.createBiquadFilter();
    hp.type = 'highpass';
    hp.frequency.value = 800;
    hp.Q.value = 2;

    osc.connect(hp);
    hp.connect(env);
    env.connect(dryGain);
    env.connect(wetGain);
    osc.start(now);
    osc.stop(now + decayTime + 0.1);
  });
}

// グリッチノイズ（テレビが潰れる音）
function playGlitchNoise(intensity) {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  const duration = 0.04 + Math.random() * 0.08; // 短くバースト

  const bufferSize = audioCtx.sampleRate * duration;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    data[i] = (Math.random() * 2 - 1);
  }

  const source = audioCtx.createBufferSource();
  source.buffer = buffer;

  // バンドパスでテレビノイズっぽく
  const bp = audioCtx.createBiquadFilter();
  bp.type = 'bandpass';
  bp.frequency.value = 2000 + Math.random() * 3000;
  bp.Q.value = 0.5;

  const env = audioCtx.createGain();
  env.gain.setValueAtTime(intensity * 0.4, now);
  env.gain.exponentialRampToValueAtTime(0.001, now + duration);

  source.connect(bp);
  bp.connect(env);
  env.connect(masterGain);
  source.start(now);
  source.stop(now + duration + 0.01);
}

// --- Visual ---

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  COLS = Math.ceil(canvas.width / CELL);
  ROWS = Math.ceil(canvas.height / CELL);
  init();
}

function init() {
  grid = [];
  for (let r = 0; r < ROWS; r++) {
    grid[r] = [];
    for (let c = 0; c < COLS; c++) {
      grid[r][c] = {
        phase: Math.random() * Math.PI * 2,
        freq: 0.3 + Math.random() * 0.4,
      };
    }
  }
}

function ripple(ex, ey) {
  initAudio();
  playCowbell();
  waves.push({
    cx: ex / CELL,
    cy: ey / CELL,
    radius: 0,
    speed: 18 + Math.random() * 6,
    thickness: 10,
    alive: true,
  });
}

canvas.addEventListener('click', (e) => ripple(e.clientX, e.clientY));
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  Array.from(e.touches).forEach(t => ripple(t.clientX, t.clientY));
}, { passive: false });
canvas.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

// グリッチ（音と同期）
let glitchLines = [];

function triggerGlitch() {
  if (!audioCtx) return; // 音が始まってから同期
  const count = 1 + Math.floor(Math.random() * 3);
  const intensity = 0.3 + Math.random() * 0.7;

  // 視覚グリッチ
  for (let i = 0; i < count; i++) {
    glitchLines.push({
      row: Math.floor(Math.random() * ROWS),
      width: 2 + Math.floor(Math.random() * 8),
      offset: Math.floor(Math.random() * 16) - 8,
      ttl: 2 + Math.floor(Math.random() * 6),
    });
  }

  // 音を同期
  playGlitchNoise(intensity);
}

setInterval(() => { if (Math.random() < 0.5) triggerGlitch(); }, 300);

let last = null;

function draw(ts) {
  if (!last) last = ts;
  const dt = (ts - last) / 1000;
  last = ts;

  const maxDist = Math.sqrt(COLS * COLS + ROWS * ROWS);
  waves.forEach(w => {
    w.radius += w.speed * dt;
    if (w.radius - w.thickness > maxDist) w.alive = false;
  });
  waves = waves.filter(w => w.alive);

  glitchLines = glitchLines.filter(g => { g.ttl--; return g.ttl > 0; });
  const glitchRowMap = {};
  glitchLines.forEach(g => {
    for (let dr = 0; dr < g.width; dr++) glitchRowMap[g.row + dr] = g.offset;
  });

  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const t = ts / 1000;

  for (let r = 0; r < ROWS; r++) {
    const glitchOffset = glitchRowMap[r] ?? 0;
    for (let c = 0; c < COLS; c++) {
      const cell = grid[r][c];
      const v = Math.sin(cell.phase + t * cell.freq * Math.PI * 2);
      let isWhite = v > 0;

      let inWave = false;
      for (const w of waves) {
        const dist = Math.sqrt((c - w.cx) ** 2 + (r - w.cy) ** 2);
        if (dist <= w.radius && dist >= w.radius - w.thickness) {
          inWave = true;
          break;
        }
      }

      if (inWave) isWhite = !isWhite;
      if (glitchOffset !== 0 && Math.random() < 0.35) isWhite = Math.random() > 0.5;

      if (isWhite) {
        ctx.fillStyle = '#fff';
        ctx.fillRect((c + glitchOffset) * CELL, r * CELL, CELL - 1, CELL - 1);
      }
    }
  }

  if (Math.random() < 0.12) {
    const n = Math.floor(Math.random() * 30);
    for (let i = 0; i < n; i++) {
      ctx.fillStyle = Math.random() > 0.5 ? '#fff' : '#000';
      ctx.fillRect(
        Math.floor(Math.random() * COLS) * CELL,
        Math.floor(Math.random() * ROWS) * CELL,
        CELL - 1, CELL - 1
      );
    }
  }

  requestAnimationFrame(draw);
}

resize();
window.addEventListener('resize', resize);
requestAnimationFrame(draw);
</script>
</body>
</html>
