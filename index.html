<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Audio Test</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 30px;
    height: 100vh;
    color: #fff;
    font-family: sans-serif;
  }
  button {
    padding: 30px 50px;
    background: #fff;
    color: #000;
    border: none;
    font-size: 14px;
    letter-spacing: 0.2em;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  #log {
    font-size: 12px;
    color: #888;
    letter-spacing: 0.1em;
    text-align: center;
    line-height: 2;
  }
</style>
</head>
<body>
<button id="btn">TAP TO BEEP</button>
<div id="log">waiting...</div>
<script>
const btn = document.getElementById('btn');
const log = document.getElementById('log');

let audioCtx = null;

btn.addEventListener('touchstart', (e) => {
  e.preventDefault();
  playBeep();
}, { passive: false });

btn.addEventListener('click', () => {
  playBeep();
});

function playBeep() {
  try {
    if (!audioCtx) {
      const AC = window.AudioContext || window.webkitAudioContext;
      audioCtx = new AC();
      log.textContent = 'AudioContext: ' + audioCtx.state;
    }

    if (audioCtx.state === 'suspended') {
      audioCtx.resume().then(() => {
        log.textContent += '\nresumed: ' + audioCtx.state;
        beep();
      });
    } else {
      beep();
    }
  } catch(e) {
    log.textContent = 'ERROR: ' + e.message;
  }
}

function beep() {
  try {
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'square';
    osc.frequency.value = 440;
    gain.gain.setValueAtTime(0.3, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(now);
    osc.stop(now + 0.5);
    log.textContent = 'played! state: ' + audioCtx.state + '\ntime: ' + now.toFixed(3);
  } catch(e) {
    log.textContent = 'BEEP ERROR: ' + e.message;
  }
}
</script>
</body>
</html>
